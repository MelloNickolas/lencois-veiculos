<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a3a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0000;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="800" height="500" fill="url(#bg)"/>
  
  <!-- Chão -->
  <rect x="0" y="360" width="800" height="140" fill="url(#floor)"/>
  
  <!-- Linha vermelha horizontal decorativa -->
  <rect x="0" y="355" width="800" height="2" fill="#cc0000" opacity="0.6"/>
  
  <!-- Círculo decorativo brilho -->
  <circle cx="400" cy="280" r="200" fill="rgba(204,0,0,0.04)" filter="url(#glow)"/>
  <circle cx="400" cy="280" r="120" fill="rgba(255,255,255,0.02)"/>
  
  <!-- Grade/textura de fundo -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="500" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="500" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="500" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  
  
  <g transform="translate(80, 160)">
    <!-- Sombra -->
    <ellipse cx="320" cy="155" rx="280" ry="18" fill="rgba(0,0,0,0.4)"/>
    <!-- Carroceria principal -->
    <path d="M40,140 L40,100 Q60,60 120,50 L180,35 Q240,20 310,20 Q380,20 420,35 L480,50 Q540,60 570,100 L580,140 Z" fill="white" opacity="0.92"/>
    <!-- Teto -->
    <path d="M130,50 L170,15 Q220,5 290,5 Q350,5 390,15 L440,50 Z" fill="white" opacity="0.85"/>
    <!-- Janelas -->
    <path d="M145,48 L175,18 Q210,8 270,8 L270,48 Z" fill="#1a3a5a" opacity="0.8"/>
    <path d="M278,48 L278,8 Q330,8 365,18 L400,48 Z" fill="#1a3a5a" opacity="0.8"/>
    <!-- Divisória janelas -->
    <line x1="275" y1="8" x2="275" y2="50" stroke="#666" stroke-width="3"/>
    <!-- Rodas -->
    <circle cx="140" cy="142" r="38" fill="#111"/>
    <circle cx="140" cy="142" r="28" fill="#222"/>
    <circle cx="140" cy="142" r="18" fill="#333"/>
    <circle cx="140" cy="142" r="8" fill="#555"/>
    <circle cx="460" cy="142" r="38" fill="#111"/>
    <circle cx="460" cy="142" r="28" fill="#222"/>
    <circle cx="460" cy="142" r="18" fill="#333"/>
    <circle cx="460" cy="142" r="8" fill="#555"/>
    <!-- Farol dianteiro -->
    <path d="M575,95 L575,115 Q578,115 580,112 L580,98 Z" fill="#ffffcc" opacity="0.9"/>
    <!-- Farol traseiro -->
    <rect x="36" y="95" width="8" height="22" rx="2" fill="#ff3333" opacity="0.9"/>
    <!-- Grade -->
    <path d="M570,100 L575,100 L575,130 L570,130 Z" fill="#333"/>
    <!-- Linha lateral -->
    <line x1="45" y1="105" x2="570" y2="105" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  </g>

  
  <!-- Texto ano -->
  <text x="680" y="60" font-family="Georgia, serif" font-size="72" fill="rgba(204,0,0,0.15)" font-weight="bold" text-anchor="end">2022</text>
  
  <!-- Nome do modelo -->
  <text x="40" y="460" font-family="Georgia, serif" font-size="28" fill="rgba(255,255,255,0.9)" font-weight="bold" letter-spacing="4">M3 COMPETITION</text>
  
  <!-- Linha vermelha decorativa -->
  <rect x="40" y="470" width="60" height="3" rx="1" fill="#cc0000"/>
  
  <!-- Logo placeholder -->
  <text x="760" y="460" font-family="Georgia, serif" font-size="11" fill="rgba(204,0,0,0.5)" text-anchor="end" letter-spacing="3">LENÇÓIS VEÍCULOS</text>
</svg>
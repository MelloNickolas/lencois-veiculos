<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veículo — Lençóis Veículos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="header-placeholder"></div>
<div class="lightbox" id="lightbox"><button class="lightbox-x" id="lb-close">✕</button><img src="" alt="" id="lb-img"></div>

<main class="vehicle-page container" id="vehicle-content">
  <div style="text-align:center;padding:80px;color:var(--gray)">Carregando...</div>
</main>

<div id="footer-placeholder"></div>

<script src="js/components.js"></script>
<script src="js/utils.js"></script>
<script>
function setMainImg(src, index) {
  const img = document.getElementById('gal-main');
  if (!img) return;
  img.style.opacity = '0';
  setTimeout(() => { img.src = src; img.style.opacity = '1'; }, 250);
  document.querySelectorAll('.gallery-thumb').forEach((t,i) => t.classList.toggle('active', i === index));
}
function openLB(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLB() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('lb-close')?.addEventListener('click', closeLB);
document.getElementById('lightbox')?.addEventListener('click', e => { if (e.target === e.currentTarget) closeLB(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLB(); });

function renderPage(v) {
  const imgs = v.galeria || [];
  const main = imgs[0] || '';
  const thumbs = imgs.length > 1 ? imgs.map((s,i) => `
    <div class="gallery-thumb${i===0?' active':''}" data-src="${s}" data-index="${i}">
      <img src="${s}" alt="Foto ${i+1}" loading="lazy">
    </div>`).join('') : '';
  return `
    <nav class="breadcrumb">
      <a href="index.html">Início</a><span class="sep">·</span>
      <a href="carros.html">Automóveis</a><span class="sep">·</span>
      <span style="color:var(--cream)">${v.marca} ${v.nome}</span>
    </nav>
    <div class="vehicle-layout">
      <div>
        <div class="gallery-main-img-wrap" id="gal-wrap">
          ${main ? `<img id="gal-main" src="${main}" alt="${v.nome}" style="transition:opacity 0.25s">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--gray);font-style:italic">Sem imagem</div>'}
        </div>
        ${thumbs ? `<div class="gallery-thumbs">${thumbs}</div>` : ''}
      </div>
      <aside class="vehicle-sidebar fade-left">
        <div class="vehicle-eyebrow eyebrow">${v.tipo} · ${v.ano}</div>
        <h1 class="vehicle-title">${v.marca}<br><em class="italic red">${v.nome}</em></h1>
        <div class="vehicle-price-wrap">
          <div class="vehicle-price-label">Valor</div>
          <div class="vehicle-price">${formatPrice(v.preco)}</div>
        </div>
        <div class="vehicle-specs">
          <div class="spec-row">
            <div class="spec-label">Ano</div>
            <div class="spec-value">${v.ano}</div>
          </div>
          <div class="spec-row">
            <div class="spec-label">Marca</div>
            <div class="spec-value">${v.marca}</div>
          </div>
          <div class="spec-row">
            <div class="spec-label">Câmbio</div>
            <div class="spec-value">${v.cambio}</div>
          </div>
          <div class="spec-row">
            <div class="spec-label">Combustível</div>
            <div class="spec-value">${v.combustivel}</div>
          </div>
          <div class="spec-row">
            <div class="spec-label">Quilometragem</div>
            <div class="spec-value">${formatKm(v.km)}</div>
          </div>
          <div class="spec-row">
            <div class="spec-label">Tipo</div>
            <div class="spec-value">${v.tipo}</div>
          </div>
        </div>
        <a href="${v.link}" target="_blank" rel="noopener" class="btn btn-primary btn-interested">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          <span>Estou Interessado!</span>
        </a>
        <p style="text-align:center;font-size:0.68rem;letter-spacing:0.12em;color:var(--gray);margin-top:10px;text-transform:uppercase">Abre o WhatsApp com mensagem pronta</p>
      </aside>
    </div>`;
}
loadVehicles().then(vehicles => {
  const { id } = getUrlParams();
  const v = id ? vehicles.find(x => x.id === id) : null;
  const content = document.getElementById('vehicle-content');
  if (!v) {
    content.innerHTML = `<div style="text-align:center;padding:100px 0"><div style="font-family:'Playfair Display',serif;font-size:5rem;color:var(--red);opacity:0.3;font-style:italic">404</div><h2 style="font-family:'Playfair Display',serif;font-size:2.5rem;margin:16px 0">Veículo não encontrado</h2><a href="carros.html" class="btn btn-primary" style="margin-top:24px"><span>Ver estoque</span></a></div>`;
    return;
  }
  document.title = `${v.marca} ${v.nome} ${v.ano} — Lençóis Veículos`;
  content.innerHTML = renderPage(v);
  document.querySelectorAll('.gallery-thumb').forEach(t => t.addEventListener('click', () => setMainImg(t.dataset.src, +t.dataset.index)));
  document.getElementById('gal-wrap')?.addEventListener('click', () => { const s = document.getElementById('gal-main')?.src; if (s) openLB(s); });
  initScrollReveal();
});
</script>
</body>
</html>
